name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          cd shared && npm ci && cd ..
          cd server && npm ci && cd ..
          cd client && npm ci && cd ..
      - name: Build shared types
        run: cd shared && npm run build
      - name: Type check server
        run: cd server && npx tsc --noEmit
      - name: Type check client
        run: cd client && npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          cd shared && npm ci && cd ..
          cd server && npm ci && cd ..
          cd client && npm ci && cd ..
      - name: Build shared
        run: cd shared && npm run build
      - name: Build server
        run: cd server && npm run build
      - name: Build client
        run: cd client && npm run build
      - name: Upload server build
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: server/dist
      - name: Upload client build
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Build server Docker image
        run: docker build -t tazkiyah/server ./server
      - name: Build client Docker image
        run: docker build -t tazkiyah/client ./client
